{{- if .Values.clickhouse.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-env.fullname" . }}-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.clickhouse.password | b64enc | quote }}
{{- end }}
{{- if and .Values.redis.enabled .Values.redis.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-env.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
type: Opaque
data:
  password: {{ .Values.redis.password | b64enc | quote }}
{{- end }}
{{- if and .Values.auth.enabled (not .Values.auth.apiKeys) (not .Values.auth.forwardHeaders.enabled) }}
{{- required "auth.enabled is true but neither auth.apiKeys nor auth.forwardHeaders.enabled is configured: provide API keys, enable trusted forward headers, or set auth.enabled=false" .Values.auth.apiKeys }}
{{- end }}
{{- if and .Values.auth.enabled .Values.auth.apiKeys }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-env.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-keys: {{ .Values.auth.apiKeys | quote }}
{{- end }}
{{- if and .Values.tinyauth.enabled (not .Values.tinyauth.usersExistingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-env.fullname" . }}-tinyauth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: tinyauth
type: Opaque
stringData:
  {{ .Values.tinyauth.usersSecretKey }}: {{ required "tinyauth.enabled is true but tinyauth.users is empty: provide bcrypt users or set tinyauth.usersExistingSecret" .Values.tinyauth.users | quote }}
{{- end }}
---
# gRPC auth token is mandatory: the sidecar refuses to start without it.
# Auto-generated when auth.grpcToken is unset, and preserved across upgrades.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-env.grpcTokenSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
type: Opaque
data:
  token: {{ include "agent-env.grpcToken" . | b64enc | quote }}
