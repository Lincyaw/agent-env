{{- if .Values.irohRelay.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-env.fullname" . }}-iroh-relay
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: iroh-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agent-env.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: iroh-relay
  template:
    metadata:
      labels:
        {{- include "agent-env.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: iroh-relay
    spec:
      containers:
        - name: iroh-relay
          image: "{{ include "agent-env.repo" (dict "repo" .Values.irohRelay.image.repository "global" .Values.global) }}:{{ .Values.irohRelay.image.tag }}"
          imagePullPolicy: {{ .Values.irohRelay.image.pullPolicy }}
          args: ["--dev"]
          ports:
            - name: http
              containerPort: {{ .Values.irohRelay.port }}
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-env.fullname" . }}-iroh-relay
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: iroh-relay
spec:
  type: {{ .Values.irohRelay.service.type | default "LoadBalancer" }}
  ports:
    - port: {{ .Values.irohRelay.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "agent-env.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: iroh-relay
{{- end }}
