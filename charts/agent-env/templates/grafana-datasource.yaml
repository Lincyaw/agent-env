{{- if and .Values.prometheus.enabled .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-env.fullname" . }}-grafana-datasource
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: grafana
data:
  arl-prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: ARL-Prometheus
        type: prometheus
        uid: arl-prometheus
        url: http://{{ include "agent-env.fullname" . }}-prometheus:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "15s"
          queryTimeout: "60s"
          httpMethod: POST
{{- end }}
