{{- if .Values.mihomo.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-env.fullname" . }}-mihomo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: mihomo
type: Opaque
stringData:
  url: {{ .Values.mihomo.subscriptionURL | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent-env.fullname" . }}-mihomo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: mihomo
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "agent-env.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mihomo
  template:
    metadata:
      labels:
        {{- include "agent-env.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mihomo
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: render-config
        image: pair-diag-cn-guangzhou.cr.volces.com/pair/redis:8-alpine
        command:
        - sh
        - -c
        - |
          cat > /data/config.yaml << ENDOFCONFIG
          mixed-port: 7890
          allow-lan: true
          bind-address: "0.0.0.0"
          mode: rule
          log-level: info
          ipv6: false
          external-controller: 0.0.0.0:9090

          proxy-providers:
            subscription:
              type: http
              url: "${SUB_URL}"
              interval: 3600
              path: ./providers/subscription.yaml
              health-check:
                enable: true
                interval: 300
                url: http://www.gstatic.com/generate_204

          proxy-groups:
            - name: auto
              type: url-test
              use:
                - subscription
              url: http://www.gstatic.com/generate_204
              interval: 300
              tolerance: 100

          rules:
            - DOMAIN-SUFFIX,github.com,auto
            - DOMAIN-SUFFIX,github.io,auto
            - DOMAIN-SUFFIX,githubusercontent.com,auto
            - DOMAIN-SUFFIX,githubassets.com,auto
            - DOMAIN-SUFFIX,ghcr.io,auto
            - DOMAIN-SUFFIX,pypi.org,auto
            - DOMAIN-SUFFIX,pythonhosted.org,auto
            - DOMAIN-SUFFIX,npmjs.org,auto
            - DOMAIN-SUFFIX,npmjs.com,auto
            - DOMAIN-SUFFIX,yarnpkg.com,auto
            - DOMAIN-SUFFIX,golang.org,auto
            - DOMAIN-SUFFIX,go.dev,auto
            - DOMAIN-SUFFIX,proxy.golang.org,auto
            - DOMAIN-SUFFIX,sum.golang.org,auto
            - DOMAIN-SUFFIX,docker.io,auto
            - DOMAIN-SUFFIX,docker.com,auto
            - DOMAIN-SUFFIX,gcr.io,auto
            - DOMAIN-SUFFIX,googleapis.com,auto
            - DOMAIN-SUFFIX,googlesource.com,auto
            - DOMAIN-SUFFIX,alpinelinux.org,auto
            - DOMAIN-SUFFIX,huggingface.co,auto
            - MATCH,DIRECT
          ENDOFCONFIG
        env:
        - name: SUB_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "agent-env.fullname" . }}-mihomo
              key: url
        volumeMounts:
        - name: data
          mountPath: /data
      containers:
      - name: mihomo
        image: {{ .Values.mihomo.image }}
        imagePullPolicy: IfNotPresent
        args: ["-d", "/data"]
        ports:
        - name: mixed
          containerPort: 7890
          protocol: TCP
        - name: api
          containerPort: 9090
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 7890
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 7890
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          {{- toYaml .Values.mihomo.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mihomo
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-env.labels" . | nindent 4 }}
    app.kubernetes.io/component: mihomo
spec:
  type: ClusterIP
  selector:
    {{- include "agent-env.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mihomo
  ports:
  - name: mixed
    port: 7890
    targetPort: 7890
    protocol: TCP
  - name: api
    port: 9090
    targetPort: 9090
    protocol: TCP
{{- end }}
