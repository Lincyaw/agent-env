{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arl-operator.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arl-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "arl-operator.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "arl-operator.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.gateway.serviceAccount.name | default (printf "%s-gateway" (include "arl-operator.fullname" .)) }}
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          args:
            - --port={{ .Values.gateway.port }}
            - --sidecar-grpc-port={{ .Values.gateway.sidecarGrpcPort }}
          env:
            - name: INTERNAL_PORT
              value: "{{ .Values.gateway.internalPort }}"
            - name: AUTH_ENABLED
              value: {{ .Values.auth.enabled | quote }}
            {{- if .Values.auth.enabled }}
            - name: AUTH_KEY_FILE
              value: "/etc/arl/keys/api-keys"
            - name: RATE_LIMIT_RPS
              value: "{{ .Values.auth.rateLimitRPS }}"
            - name: RATE_LIMIT_BURST
              value: "{{ .Values.auth.rateLimitBurst }}"
            {{- if .Values.auth.allowedOrigins }}
            - name: ALLOWED_ORIGINS
              value: "{{ .Values.auth.allowedOrigins }}"
            {{- end }}
            {{- end }}
            - name: GRPC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: arl-grpc-token
                  key: token
            - name: MANAGED_POOL_INITIAL_REPLICAS
              value: "{{ .Values.managedPool.initialReplicas }}"
            - name: MANAGED_POOL_MIN_REPLICAS
              value: "{{ .Values.managedPool.minReplicas }}"
            - name: MANAGED_POOL_MAX_REPLICAS
              value: "{{ .Values.managedPool.maxReplicas }}"
            - name: MANAGED_POOL_SCALE_UP_STEP
              value: "{{ .Values.managedPool.scaleUpStep }}"
            - name: MANAGED_POOL_IDLE_COOLDOWN
              value: "{{ .Values.managedPool.idleCooldown }}"
            - name: MANAGED_POOL_EMPTY_TTL
              value: "{{ .Values.managedPool.emptyTTL }}"
            - name: MANAGED_POOL_SWEEP_INTERVAL
              value: "{{ .Values.managedPool.sweepInterval }}"
            - name: GATEWAY_IDLE_TIMEOUT
              value: "{{ .Values.gateway.idleTimeout }}"
            - name: GATEWAY_MAX_LIFETIME
              value: "{{ .Values.gateway.maxLifetime }}"
            - name: GATEWAY_SWEEP_INTERVAL
              value: "{{ .Values.gateway.sweepInterval }}"
            - name: GATEWAY_WRITE_TIMEOUT
              value: "{{ .Values.gateway.writeTimeout }}"
            {{- if .Values.clickhouse.enabled }}
            - name: CLICKHOUSE_ENABLED
              value: "true"
            - name: TRAJECTORY_ENABLED
              value: "true"
            - name: CLICKHOUSE_ADDR
              value: {{ include "arl-operator.clickhouseAddr" . | quote }}
            - name: CLICKHOUSE_DATABASE
              value: "{{ .Values.clickhouse.database }}"
            - name: CLICKHOUSE_USERNAME
              value: "{{ .Values.clickhouse.username }}"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "arl-operator.fullname" . }}-clickhouse
                  key: password
                  optional: false
            {{- end }}
            {{- if .Values.redis.enabled }}
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_ADDR
              value: {{ include "arl-operator.redisAddr" . | quote }}
            - name: REDIS_DB
              value: "{{ .Values.redis.db }}"
            {{- if .Values.redis.password }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "arl-operator.fullname" . }}-redis
                  key: password
                  optional: false
            {{- end }}
            {{- end }}
            {{- include "arl-operator.otelEnv" . | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
            - name: internal
              containerPort: {{ .Values.gateway.internalPort }}
              protocol: TCP
          {{- if .Values.auth.enabled }}
          volumeMounts:
            - name: auth-keys
              mountPath: /etc/arl/keys
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      {{- if .Values.auth.enabled }}
      volumes:
        - name: auth-keys
          secret:
            secretName: {{ include "arl-operator.fullname" . }}-auth
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "arl-operator.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "arl-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port | default .Values.gateway.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.gateway.service.type "NodePort") .Values.gateway.service.nodePort }}
      nodePort: {{ .Values.gateway.service.nodePort }}
      {{- end }}
  selector:
    {{- include "arl-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
{{- end }}
