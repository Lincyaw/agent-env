# Default values for arl-operator
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: arl-operator
  pullPolicy: IfNotPresent
  tag: "latest"

sidecar:
  image:
    repository: arl-sidecar
    pullPolicy: IfNotPresent
    tag: "latest"
  httpPort: 8080
  grpcPort: 9090

# Executor agent configuration
executorAgent:
  image:
    repository: arl-executor-agent
    pullPolicy: IfNotPresent
    tag: "latest"

# Gateway configuration
gateway:
  enabled: true
  replicaCount: 1
  image:
    repository: arl-gateway
    pullPolicy: IfNotPresent
    tag: "latest"
  port: 8080
  sidecarGrpcPort: 9090
  service:
    type: ClusterIP
    nodePort: ""  # e.g. 30080, only used when type is NodePort
  serviceAccount:
    name: ""
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 2Gi
  # Session lifecycle defaults
  idleTimeout: "600s"       # Max idle time before session is reaped
  maxLifetime: "3600s"      # Max total session lifetime
  sweepInterval: "30s"      # How often to check for expired sessions

# Managed pool auto-scaling configuration (for POST /v1/managed/sessions)
managedPool:
  initialReplicas: 2       # Starting replicas when pool is first created
  minReplicas: 0           # Scale-down floor
  maxReplicas: 100          # Scale-up ceiling
  scaleUpStep: 2           # Minimum replicas added per scale-up event
  idleCooldown: "5m"       # How long excess idle pods must persist before scale-down
  emptyTTL: "10m"          # How long to keep a pool with 0 sessions before deletion
  sweepInterval: "30s"     # Background sweep interval for scale-down and GC

# Redis configuration (for HA session state persistence across gateway replicas)
redis:
  enabled: false
  # Deploy a single-instance Redis in-cluster. Set to false to use an external Redis.
  deploy: true
  image:
    repository: pair-diag-cn-guangzhou.cr.volces.com/pair/redis
    tag: "8-alpine"
    pullPolicy: IfNotPresent
  addr: "redis:6379"       # Only used when deploy=false (external Redis)
  password: ""             # Redis password (stored in Secret)
  db: 0                    # Redis database number
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "500m"
      memory: 512Mi

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

resources:
  limits:
    cpu: "4"
    memory: 8Gi
  requests:
    cpu: "1"
    memory: 2Gi

nodeSelector: {}

tolerations: []

affinity: {}

# Operator configuration
operator:
  metricsAddr: ":8080"
  probeAddr: ":8081"
  enableLeaderElection: true
  enableWebhooks: false
  enableMetrics: true
  enableMiddleware: true
  workspaceDir: "/workspace"
  httpClientTimeout: "30s"

# Pool configuration
pool:
  defaultReplicas: 3
  defaultRequeueDelay: "10s"

# ClickHouse configuration (for audit logging and trajectory)
clickhouse:
  # Enable ClickHouse deployment
  enabled: false
  # Image (use private registry since nodes cannot access Docker Hub)
  image:
    repository: pair-diag-cn-guangzhou.cr.volces.com/pair/clickhouse-server
    tag: "24.8"
    pullPolicy: IfNotPresent
  # Connection settings
  host: ""  # auto-resolved via helper to <fullname>-clickhouse
  port: 9000
  database: "arl"
  username: "default"
  # REQUIRED: Must be set by the user. Do not use a default password.
  password: "clickhouse123"
  batchSize: 100
  flushInterval: "10s"
  # Data retention
  retentionDays: 30
  # Storage configuration
  storageClassName: "ebs-ssd"
  storageSize: "10Gi"
  # Service configuration
  serviceType: "ClusterIP"
  # httpNodePort: 30123   # Port for HTTP interface (8123) - uncomment if serviceType is NodePort
  # nativeNodePort: 30000 # Port for native protocol (9000) - uncomment if serviceType is NodePort
  # Resources
  resources:
    requests:
      cpu: "8"
      memory: 8Gi
    limits:
      cpu: "16"
      memory: 32Gi

# CRD installation
crds:
  install: true
  keep: true

# API Server Priority and Fairness
# Promotes operator & gateway ServiceAccounts to a higher priority level
# so K8s API requests are not throttled under high load.
apiPriority:
  enabled: true
  priorityLevel: "workload-high"  # workload-high has ~110 concurrency seats
  matchingPrecedence: 900         # lower number = higher priority (exempt=1, system=900s)

# ─────────────────────────────────────────────────────────────────────────────
# Alerting (AlertManager + Feishu)
# ─────────────────────────────────────────────────────────────────────────────
alerting:
  enabled: true
  image: pair-diag-cn-guangzhou.cr.volces.com/pair/alertmanager:v0.27.0
  feishu:
    webhookURL: ""  # 飞书自定义机器人 Webhook URL
  resources:
    requests:
      cpu: "100m"
      memory: 128Mi
    limits:
      cpu: "500m"
      memory: 256Mi

# ─────────────────────────────────────────────────────────────────────────────
# Prometheus
# ─────────────────────────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image: pair-diag-cn-guangzhou.cr.volces.com/pair/prometheus:v3.10.0
  retentionTime: "3d"
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 16Gi
  persistence:
    enabled: false
    storageClass: ebs-ssd
    size: 50Gi

# ─────────────────────────────────────────────────────────────────────────────
# Grafana
# ─────────────────────────────────────────────────────────────────────────────
grafana:
  enabled: true
  image: pair-diag-cn-guangzhou.cr.volces.com/pair/grafana:12.3.1
  adminUser: admin
  adminPassword: newpassword123
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: "4"
      memory: 8Gi
    limits:
      cpu: "8"
      memory: 16Gi
  persistence:
    enabled: false
    storageClass: ebs-ssd
    size: 20Gi

# ─────────────────────────────────────────────────────────────────────────────
# Metrics / Prometheus scraping
# ─────────────────────────────────────────────────────────────────────────────
metrics:
  # Creates a dedicated ClusterIP Service exposing the operator's /metrics port
  service:
    enabled: true
    port: 8080
    targetPort: metrics
  # Creates VMServiceScrape (VictoriaMetrics) for both operator and gateway.
  serviceMonitor:
    enabled: true
    interval: "15s"
    # Labels required by the VictoriaMetrics agent in this cluster
    additionalLabels:
      volcengine.vmp: "true"
  # Creates standard Prometheus ServiceMonitor (monitoring.coreos.com/v1)
  # Enable this if using kube-prometheus-stack instead of VictoriaMetrics.
  prometheusServiceMonitor:
    enabled: false
    interval: "15s"
    # Labels to match your Prometheus operator's serviceMonitorSelector
    # e.g. release: kube-prometheus-stack
    additionalLabels: {}
