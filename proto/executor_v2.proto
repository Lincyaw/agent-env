syntax = "proto3";

package arl.executor.v2;

option go_package = "github.com/Lincyaw/agent-env/pkg/pb/executorv2";

// Request is the top-level multiplexed client-to-server frame.
// Each request carries a correlation tag returned verbatim in the
// matching Response or subsequent Events.
message Request {
  uint32 tag = 1;
  oneof kind {
    PingRequest         ping          = 2;
    SpawnRequest        spawn         = 3;
    WriteInRequest      write_in      = 4;
    SignalRequest       signal        = 5;
    ResizeRequest       resize        = 6;
    ReadRequest         read          = 7;
    WriteRequest        write         = 8;
    TunnelRequest       tunnel        = 11;
    WatchRequest        watch         = 12;
    UnwatchRequest      unwatch       = 13;
    CloseTunnelRequest  close_tunnel  = 14;
    ListTunnelsRequest  list_tunnels  = 15;
    CheckpointDownloadRequest checkpoint_download = 16;
    CheckpointListRequest     checkpoint_list     = 17;
  }
}

// Response is the top-level server-to-client reply frame.
message Response {
  uint32 tag = 1;
  oneof kind {
    PingResponse         ping          = 2;
    SpawnResponse        spawn         = 3;
    WriteInResponse      write_in      = 4;
    SignalResponse       signal        = 5;
    ResizeResponse       resize        = 6;
    ReadResponse         read          = 7;
    WriteResponse        write         = 8;
    TunnelResponse       tunnel        = 11;
    WatchResponse        watch         = 12;
    UnwatchResponse      unwatch       = 13;
    ErrorResponse        error         = 14;
    CloseTunnelResponse  close_tunnel  = 15;
    ListTunnelsResponse  list_tunnels  = 16;
    CheckpointDownloadResponse checkpoint_download = 17;
    CheckpointListResponse     checkpoint_list     = 18;
  }
}

// Event is a server-pushed frame for asynchronous notifications.
message Event {
  uint32 tag = 1;
  oneof kind {
    StdoutEvent   stdout    = 2;
    StderrEvent   stderr    = 3;
    ExitEvent     exit      = 4;
    FsChangeEvent fs_change = 5;
  }
}

// ---------------------------------------------------------------------------
// 1. ping
// ---------------------------------------------------------------------------

message PingRequest {}

message PingResponse {}

// ---------------------------------------------------------------------------
// 2. spawn
// ---------------------------------------------------------------------------

message SpawnRequest {
  repeated string command = 1;
  map<string, string> env = 2;
  string working_dir = 3;
  int32 timeout_seconds = 4;
  bool pty = 5;
  bool stdin = 6;
  int32 rows = 7;
  int32 cols = 8;
}

message SpawnResponse {
  uint32 process_tag = 1;
  int32 pid = 2;
}

// ---------------------------------------------------------------------------
// 3. write_in
// ---------------------------------------------------------------------------

message WriteInRequest {
  uint32 process_tag = 1;
  bytes data = 2;
}

message WriteInResponse {}

// ---------------------------------------------------------------------------
// 4. signal
// ---------------------------------------------------------------------------

message SignalRequest {
  uint32 process_tag = 1;
  string signal = 2;
}

message SignalResponse {}

// ---------------------------------------------------------------------------
// 5. resize
// ---------------------------------------------------------------------------

message ResizeRequest {
  uint32 process_tag = 1;
  int32 rows = 2;
  int32 cols = 3;
}

message ResizeResponse {}

// ---------------------------------------------------------------------------
// 6. read
// ---------------------------------------------------------------------------

message ReadRequest {
  string path = 1;
}

message ReadResponse {
  int64 size_bytes = 1;
  string sha256 = 2;
}

// ---------------------------------------------------------------------------
// 7. write
// ---------------------------------------------------------------------------

message WriteRequest {
  string path = 1;
  string expected_sha256 = 2;
  int64 size_hint = 3;
}

message WriteResponse {
  int64 bytes_written = 1;
  string sha256 = 2;
}

// ---------------------------------------------------------------------------
// 8. tunnel
// ---------------------------------------------------------------------------

message TunnelRequest {
  string host = 1;
  uint32 port = 2;
}

message TunnelResponse {}

// ---------------------------------------------------------------------------
// 9. watch
// ---------------------------------------------------------------------------

message WatchRequest {
  string path = 1;
  bool recursive = 2;
  repeated string event_types = 3;
}

message WatchResponse {
  uint32 watch_id = 1;
}

// ---------------------------------------------------------------------------
// 10. unwatch
// ---------------------------------------------------------------------------

message UnwatchRequest {
  uint32 watch_id = 1;
}

message UnwatchResponse {}

// ---------------------------------------------------------------------------
// 11. close_tunnel
// ---------------------------------------------------------------------------

message CloseTunnelRequest {
  uint32 tunnel_tag = 1;
}

message CloseTunnelResponse {}

// ---------------------------------------------------------------------------
// 12. list_tunnels
// ---------------------------------------------------------------------------

message ListTunnelsRequest {}

message ListTunnelsResponse {
  repeated TunnelInfo tunnels = 1;
}

message TunnelInfo {
  uint32 tag = 1;
  string host = 2;
  uint32 port = 3;
}

// ---------------------------------------------------------------------------
// 13. checkpoint_download
// ---------------------------------------------------------------------------

message CheckpointDownloadRequest {
  int32 through = 1;
  bool single_step = 2;
}

message CheckpointDownloadResponse {
  int64 size_bytes = 1;
}

// ---------------------------------------------------------------------------
// 14. checkpoint_list
// ---------------------------------------------------------------------------

message CheckpointListRequest {}

message CheckpointListResponse {
  repeated int32 steps = 1;
}

// ---------------------------------------------------------------------------
// ErrorResponse
// ---------------------------------------------------------------------------

message ErrorResponse {
  int32 code = 1;
  string message = 2;
}

// ---------------------------------------------------------------------------
// Events
// ---------------------------------------------------------------------------

message StdoutEvent {
  uint32 process_tag = 1;
  bytes data = 2;
}

message StderrEvent {
  uint32 process_tag = 1;
  bytes data = 2;
}

message ExitEvent {
  uint32 process_tag = 1;
  int32 exit_code = 2;
}

message FsChangeEvent {
  uint32 watch_id = 1;
  string path = 2;
  string event_type = 3;
}
