syntax = "proto3";

package arl.executor.v2;

option go_package = "github.com/Lincyaw/agent-env/pkg/pb/executorv2";

// Request is the top-level multiplexed client-to-server frame.
// Each request carries a correlation tag returned verbatim in the
// matching Response or subsequent Events.
message Request {
  uint32 tag = 1;
  oneof kind {
    PingRequest    ping     = 2;
    SpawnRequest   spawn    = 3;
    WriteInRequest write_in = 4;
    SignalRequest  signal   = 5;
    ResizeRequest  resize   = 6;
    ReadRequest    read     = 7;
    WriteRequest   write    = 8;
    StatRequest    stat     = 9;
    ListRequest    list     = 10;
    TunnelRequest  tunnel   = 11;
    WatchRequest   watch    = 12;
    UnwatchRequest unwatch  = 13;
  }
}

// Response is the top-level server-to-client reply frame.
message Response {
  uint32 tag = 1;
  oneof kind {
    PingResponse    ping     = 2;
    SpawnResponse   spawn    = 3;
    WriteInResponse write_in = 4;
    SignalResponse  signal   = 5;
    ResizeResponse  resize   = 6;
    ReadResponse    read     = 7;
    WriteResponse   write    = 8;
    StatResponse    stat     = 9;
    ListResponse    list     = 10;
    TunnelResponse  tunnel   = 11;
    WatchResponse   watch    = 12;
    UnwatchResponse unwatch  = 13;
    ErrorResponse   error    = 14;
  }
}

// Event is a server-pushed frame for asynchronous notifications.
// Four event types only; tunnel and file data flow as raw bytes on
// dedicated streams, not as protobuf Events.
message Event {
  uint32 tag = 1;
  oneof kind {
    StdoutEvent   stdout    = 2;
    StderrEvent   stderr    = 3;
    ExitEvent     exit      = 4;
    FsChangeEvent fs_change = 5;
  }
}

// ---------------------------------------------------------------------------
// 1. ping — health check
// ---------------------------------------------------------------------------

message PingRequest {}

message PingResponse {}

// ---------------------------------------------------------------------------
// 2. spawn — create a process
// ---------------------------------------------------------------------------

message SpawnRequest {
  repeated string command = 1;
  map<string, string> env = 2;
  string working_dir = 3;
  int32 timeout_seconds = 4;
  bool pty = 5;
  bool stdin = 6;
  int32 rows = 7;
  int32 cols = 8;
}

message SpawnResponse {
  uint32 process_tag = 1;
  int32 pid = 2;
}

// ---------------------------------------------------------------------------
// 3. write_in — write bytes to process stdin
// ---------------------------------------------------------------------------

message WriteInRequest {
  uint32 process_tag = 1;
  bytes data = 2;
}

message WriteInResponse {}

// ---------------------------------------------------------------------------
// 4. signal — send signal to process
// ---------------------------------------------------------------------------

message SignalRequest {
  uint32 process_tag = 1;
  string signal = 2;
}

message SignalResponse {}

// ---------------------------------------------------------------------------
// 5. resize — change PTY window size
// ---------------------------------------------------------------------------

message ResizeRequest {
  uint32 process_tag = 1;
  int32 rows = 2;
  int32 cols = 3;
}

message ResizeResponse {}

// ---------------------------------------------------------------------------
// 6. read — read file contents
//
// The ReadResponse confirms the request. Actual file bytes follow on the
// underlying transport:
//   QUIC  — uni stream tagged [0x03][tag:4B], raw bytes after header
//   Unix  — [4B big-endian length][raw bytes] chunks, [4B zero] terminator
// ---------------------------------------------------------------------------

message ReadRequest {
  string path = 1;
}

message ReadResponse {
  int64 size_bytes = 1;
  string sha256 = 2;
}

// ---------------------------------------------------------------------------
// 7. write — write file contents
//
// The client sends WriteRequest, then pushes file bytes on the transport:
//   QUIC  — uni stream tagged [0x04][tag:4B], raw bytes after header
//   Unix  — [4B big-endian length][raw bytes] chunks, [4B zero] terminator
// The server replies with WriteResponse after all bytes are received.
// ---------------------------------------------------------------------------

message WriteRequest {
  string path = 1;
  string expected_sha256 = 2;
  int64 size_hint = 3;
}

message WriteResponse {
  int64 bytes_written = 1;
  string sha256 = 2;
}

// ---------------------------------------------------------------------------
// 8. stat — file metadata
// ---------------------------------------------------------------------------

message StatRequest {
  string path = 1;
}

message StatResponse {
  string path = 1;
  int64 size_bytes = 2;
  string mode = 3;
  int64 mod_time_unix = 4;
  bool is_dir = 5;
}

// ---------------------------------------------------------------------------
// 9. list — directory contents
// ---------------------------------------------------------------------------

message ListRequest {
  string path = 1;
  bool recursive = 2;
}

message ListResponse {
  repeated DirEntry entries = 1;
}

message DirEntry {
  string name = 1;
  int64 size_bytes = 2;
  string mode = 3;
  int64 mod_time_unix = 4;
  bool is_dir = 5;
}

// ---------------------------------------------------------------------------
// 10. tunnel — TCP proxy (bidirectional stream)
//
// After TunnelResponse, raw bidirectional bytes flow on the transport:
//   QUIC  — bidi stream tagged [0x05][tag:4B]
//   Unix  — [4B big-endian length][raw bytes] framed, closing = [4B zero]
// ---------------------------------------------------------------------------

message TunnelRequest {
  string host = 1;
  uint32 port = 2;
}

message TunnelResponse {}

// ---------------------------------------------------------------------------
// 11. watch — subscribe to filesystem change events
// ---------------------------------------------------------------------------

message WatchRequest {
  string path = 1;
  bool recursive = 2;
  repeated string event_types = 3;
}

message WatchResponse {
  uint32 watch_id = 1;
}

// ---------------------------------------------------------------------------
// 12. unwatch — unsubscribe from filesystem events
// ---------------------------------------------------------------------------

message UnwatchRequest {
  uint32 watch_id = 1;
}

message UnwatchResponse {}

// ---------------------------------------------------------------------------
// ErrorResponse — returned in the Response.error slot on failure
// ---------------------------------------------------------------------------

message ErrorResponse {
  int32 code = 1;
  string message = 2;
}

// ---------------------------------------------------------------------------
// Events (server → client, pushed asynchronously)
// ---------------------------------------------------------------------------

message StdoutEvent {
  uint32 process_tag = 1;
  bytes data = 2;
}

message StderrEvent {
  uint32 process_tag = 1;
  bytes data = 2;
}

message ExitEvent {
  uint32 process_tag = 1;
  int32 exit_code = 2;
}

message FsChangeEvent {
  uint32 watch_id = 1;
  string path = 2;
  string event_type = 3;
}
