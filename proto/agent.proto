syntax = "proto3";

package arl.sidecar;

option go_package = "github.com/Lincyaw/agent-env/pkg/pb";

// AgentService provides command execution and interactive shell
service AgentService {
  // Execute runs a command (Job mode) or starts a background service (Service mode)
  rpc Execute(ExecRequest) returns (stream ExecLog);

  // WriteFile streams one file into the executor workspace.
  rpc WriteFile(stream WriteFileChunk) returns (WriteFileResponse);

  // ReadFile streams one file from the executor workspace.
  rpc ReadFile(ReadFileRequest) returns (stream FileChunk);

  // InteractiveShell provides bidirectional streaming for interactive shell sessions
  rpc InteractiveShell(stream ShellInput) returns (stream ShellOutput);

  // StreamLogs streams log entries from the sidecar ring buffer.
  rpc StreamLogs(LogsRequest) returns (stream LogEntry);
}

// ExecRequest specifies a command to execute
message ExecRequest {
  repeated string command = 1;
  map<string, string> env = 2;
  string working_dir = 3;
  bool background = 4;  // true for Service mode, false for Job mode
  int32 timeout_seconds = 5;
}

// ExecLog streams output from command execution
message ExecLog {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
  bool done = 4;
}

// WriteFileChunk streams raw bytes to a relative path inside the workspace.
// The first chunk must set path. expected_sha256 is optional.
message WriteFileChunk {
  string path = 1;
  bytes data = 2;
  string expected_sha256 = 3;
}

// WriteFileResponse reports how many bytes were written.
message WriteFileResponse {
  string path = 1;
  int64 bytes_written = 2;
  string sha256 = 3;
}

// ReadFileRequest reads raw bytes from a relative path inside the workspace.
message ReadFileRequest {
  string path = 1;
}

// FileChunk streams raw bytes from a file. The final message sets done=true
// and carries size_bytes and sha256.
message FileChunk {
  string path = 1;
  bytes data = 2;
  int64 offset = 3;
  int64 size_bytes = 4;
  string sha256 = 5;
  bool done = 6;
}

// ShellInput represents input to an interactive shell session
message ShellInput {
  oneof input {
    string data = 1;      // Stdin data to send to the shell
    string signal = 2;    // Signal to send (e.g., "SIGINT" for Ctrl+C)
  }
  bool resize = 3;        // Terminal resize event
  int32 rows = 4;         // Terminal rows (used with resize)
  int32 cols = 5;         // Terminal columns (used with resize)
}

// ShellOutput represents output from an interactive shell session
message ShellOutput {
  string data = 1;        // Stdout/stderr data from the shell
  int32 exit_code = 2;    // Exit code (set when shell exits)
  bool closed = 3;        // True when shell session has ended
}

// LogsRequest configures log streaming
message LogsRequest {
  bool follow = 1;        // Follow new log lines (like tail -f)
  int32 tail_lines = 2;   // Number of recent lines to return (0 = all buffered)
}

// LogEntry is a single log line
message LogEntry {
  string timestamp = 1;   // RFC3339Nano
  string level = 2;       // info, warn, error
  string message = 3;     // Log line content
  string source = 4;      // "sidecar", "executor", "exec"
}
