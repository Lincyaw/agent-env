apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: agent-env

build:
  artifacts:
    - image: arl-sidecar
      docker:
        dockerfile: Dockerfile.sidecar
    - image: arl-gateway
      docker:
        dockerfile: Dockerfile.gateway
    - image: arl-executor-agent
      docker:
        dockerfile: Dockerfile.executor-agent
  tagPolicy:
    gitCommit: {}

manifests:
  helm:
    releases:
      - name: agent-env
        chartPath: charts/agent-env
        namespace: arl
        createNamespace: true
        setValueTemplates:
          sidecar.image.repository: "{{.IMAGE_REPO_arl_sidecar}}"
          sidecar.image.tag: "{{.IMAGE_TAG_arl_sidecar}}"
          gateway.image.repository: "{{.IMAGE_REPO_arl_gateway}}"
          gateway.image.tag: "{{.IMAGE_TAG_arl_gateway}}"
          executorAgent.image.repository: "{{.IMAGE_REPO_arl_executor_agent}}"
          executorAgent.image.tag: "{{.IMAGE_TAG_arl_executor_agent}}"

deploy:
  kubectl:
    flags:
      apply:
        - --server-side=true
        - --force-conflicts=true

profiles:
  - name: dev
    activation:
      - command: dev
    build:
      artifacts:
        - image: arl-sidecar
          docker:
            dockerfile: Dockerfile.sidecar
          sync:
            manual:
              - src: "cmd/sidecar/**/*.go"
                dest: /app
              - src: "pkg/sidecar/**/*.go"
                dest: /app
        - image: arl-gateway
          docker:
            dockerfile: Dockerfile.gateway
          sync:
            manual:
              - src: "cmd/gateway/**/*.go"
                dest: /app
              - src: "pkg/gateway/**/*.go"
                dest: /app
        - image: arl-executor-agent
          docker:
            dockerfile: Dockerfile.executor-agent
          sync:
            manual:
              - src: "cmd/executor-agent/**/*.go"
                dest: /app
    manifests:
      helm:
        releases:
          - name: agent-env
            chartPath: charts/agent-env
            namespace: arl
            createNamespace: true
            setValueTemplates:
              sidecar.image.tag: "{{.IMAGE_TAG}}"
              gateway.image.tag: "{{.IMAGE_TAG2}}"
              executorAgent.image.tag: "{{.IMAGE_TAG3}}"
    deploy:
      kubectl:
        flags:
          apply:
            - --server-side=true
            - --force-conflicts=true
