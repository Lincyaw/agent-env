apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: agent-env

build:
  local:
    useBuildkit: true
  artifacts:
    - image: arl-sidecar
      docker:
        dockerfile: Dockerfile.sidecar
    - image: arl-gateway
      docker:
        dockerfile: Dockerfile.gateway
    - image: arl-executor-agent
      docker:
        dockerfile: Dockerfile.executor-agent-rs
    - image: arl-image-locality-scheduler
      docker:
        dockerfile: Dockerfile.image-locality-scheduler
  tagPolicy:
    gitCommit: {}

manifests:
  helm:
    releases:
      - name: agent-env
        chartPath: charts/agent-env
        namespace: arl
        createNamespace: true
        setValueTemplates:
          sidecar.image.repository: "{{.IMAGE_REPO_arl_sidecar}}"
          sidecar.image.tag: "{{.IMAGE_TAG_arl_sidecar}}"
          gateway.image.repository: "{{.IMAGE_REPO_arl_gateway}}"
          gateway.image.tag: "{{.IMAGE_TAG_arl_gateway}}"
          executorAgent.image.repository: "{{.IMAGE_REPO_arl_executor_agent}}"
          executorAgent.image.tag: "{{.IMAGE_TAG_arl_executor_agent}}"
          imageLocalityScheduler.image.repository: "{{.IMAGE_REPO_arl_image_locality_scheduler}}"
          imageLocalityScheduler.image.tag: "{{.IMAGE_TAG_arl_image_locality_scheduler}}"

deploy:
  kubectl:
    flags:
      apply:
        - --server-side=true
        - --force-conflicts=true

profiles:
  - name: dev
    activation:
      - command: dev
    build:
      artifacts:
        - image: arl-sidecar
          docker:
            dockerfile: Dockerfile.sidecar
          sync:
            manual:
              - src: "cmd/sidecar/**/*.go"
                dest: /app
              - src: "pkg/sidecar/**/*.go"
                dest: /app
        - image: arl-gateway
          docker:
            dockerfile: Dockerfile.gateway
          sync:
            manual:
              - src: "cmd/gateway/**/*.go"
                dest: /app
              - src: "pkg/gateway/**/*.go"
                dest: /app
        - image: arl-executor-agent
          docker:
            dockerfile: Dockerfile.executor-agent-rs
        - image: arl-image-locality-scheduler
          docker:
            dockerfile: Dockerfile.image-locality-scheduler
    manifests:
      helm:
        releases:
          - name: agent-env
            chartPath: charts/agent-env
            namespace: arl
            createNamespace: true
            setValueTemplates:
              sidecar.image.repository: "{{.IMAGE_REPO_arl_sidecar}}"
              sidecar.image.tag: "{{.IMAGE_TAG_arl_sidecar}}"
              gateway.image.repository: "{{.IMAGE_REPO_arl_gateway}}"
              gateway.image.tag: "{{.IMAGE_TAG_arl_gateway}}"
              executorAgent.image.repository: "{{.IMAGE_REPO_arl_executor_agent}}"
              executorAgent.image.tag: "{{.IMAGE_TAG_arl_executor_agent}}"
              imageLocalityScheduler.image.repository: "{{.IMAGE_REPO_arl_image_locality_scheduler}}"
              imageLocalityScheduler.image.tag: "{{.IMAGE_TAG_arl_image_locality_scheduler}}"
    deploy:
      kubectl:
        flags:
          apply:
            - --server-side=true
            - --force-conflicts=true
