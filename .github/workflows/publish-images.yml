name: Publish Images

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g., v0.1.0 or 0.1.0)"
        required: true
      registry:
        description: "Image registry/repository prefix"
        required: true
        default: "docker.io/opspai"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: arl-gateway
            dockerfile: Dockerfile.gateway
          - image: arl-sidecar
            dockerfile: Dockerfile.sidecar
          - image: arl-executor-agent
            dockerfile: Dockerfile.executor-agent
          - image: arl-image-locality-scheduler
            dockerfile: Dockerfile.image-locality-scheduler

    env:
      DEFAULT_REGISTRY: docker.io/opspai

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_TAG="${{ github.event.inputs.tag }}"
            REGISTRY="${{ github.event.inputs.registry }}"
          else
            RAW_TAG="${GITHUB_REF_NAME}"
            REGISTRY="${DEFAULT_REGISTRY}"
          fi

          VERSION="${RAW_TAG#v}"
          TAG="v${VERSION}"
          IMAGE_PREFIX="${REGISTRY%/}"
          REGISTRY_HOST="${IMAGE_PREFIX%%/*}"

          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: ${RAW_TAG}" >&2
            exit 1
          fi

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "image_prefix=${IMAGE_PREFIX}"
            echo "registry_host=${REGISTRY_HOST}"
          } >> "${GITHUB_OUTPUT}"

          echo "Publishing ${IMAGE_PREFIX}/${{ matrix.image }}:${TAG}"
          echo "Publishing ${IMAGE_PREFIX}/${{ matrix.image }}:${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate registry credentials
        if: ${{ steps.meta.outputs.registry_host != 'ghcr.io' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          USERNAME="${DOCKERHUB_USERNAME:-${REGISTRY_USERNAME}}"
          PASSWORD="${DOCKERHUB_TOKEN:-${DOCKERHUB_PASSWORD:-${REGISTRY_PASSWORD}}}"

          if [ -z "${USERNAME}" ] || [ -z "${PASSWORD}" ]; then
            echo "DOCKERHUB_USERNAME plus DOCKERHUB_TOKEN, or REGISTRY_USERNAME plus REGISTRY_PASSWORD, are required for ${{ steps.meta.outputs.registry_host }}" >&2
            exit 1
          fi

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.meta.outputs.registry_host }}
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKERHUB_PASSWORD || secrets.REGISTRY_PASSWORD || github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/${{ matrix.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_prefix }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Summarize published image
        run: |
          {
            echo "### Published image"
            echo "- ${{ steps.meta.outputs.image_prefix }}/${{ matrix.image }}:${{ steps.meta.outputs.tag }}"
            echo "- ${{ steps.meta.outputs.image_prefix }}/${{ matrix.image }}:${{ steps.meta.outputs.version }}"
          } >> "${GITHUB_STEP_SUMMARY}"
