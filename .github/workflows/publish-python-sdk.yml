name: Publish Python SDK

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.1.0)"
        required: true
        default: "0.0.0"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi

    env:
      SDK_DIR: "sdk/python/arl"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ] && [ "${{ github.event.inputs.version }}" != "0.0.0" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Update version in pyproject.toml
        run: |
          cd ${SDK_DIR}
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          echo "📝 Updated version to ${{ steps.version.outputs.version }}"
          grep "^version" pyproject.toml

      - name: Verify SDK
        run: |
          if [ ! -f "${SDK_DIR}/pyproject.toml" ]; then
            echo "❌ pyproject.toml not found"
            exit 1
          fi
          if [ ! -d "${SDK_DIR}/arl" ]; then
            echo "❌ arl package directory not found"
            exit 1
          fi
          echo "✅ SDK structure verified"

      - name: Build and publish
        run: |
          cd ${SDK_DIR}
          echo "🔨 Building package..."
          uv build --out-dir dist

          echo "🧪 Verifying built wheel imports..."
          python -m venv /tmp/arl-sdk-verify
          /tmp/arl-sdk-verify/bin/python -m pip install --upgrade pip
          /tmp/arl-sdk-verify/bin/python -m pip install dist/*.whl
          cd /tmp
          /tmp/arl-sdk-verify/bin/python - <<'PY'
          import arl
          print(f"✅ imported arl from {arl.__file__}")
          PY

          echo "📦 Publishing to PyPI..."
          cd "${GITHUB_WORKSPACE}/${SDK_DIR}"
          uv publish dist/* --trusted-publishing always

          echo "✅ Successfully published arl==${{ steps.version.outputs.version }} to PyPI!"
