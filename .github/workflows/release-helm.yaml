name: Publish Helm Chart

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version to publish (e.g., 0.1.0)"
        required: true
        default: "0.1.0"
      oci_registry:
        description: "OCI chart registry namespace"
        required: true
        default: "registry-1.docker.io/opspai"

permissions:
  contents: write
  pages: write

jobs:
  publish:
    name: Publish Helm Chart
    runs-on: ubuntu-latest
    env:
      DEFAULT_OCI_REGISTRY: registry-1.docker.io/opspai

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Chart version: ${VERSION}"

      - name: Resolve OCI registry
        id: oci
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OCI_REGISTRY="${{ github.event.inputs.oci_registry }}"
          else
            OCI_REGISTRY="${DEFAULT_OCI_REGISTRY}"
          fi

          OCI_REGISTRY="${OCI_REGISTRY#oci://}"
          OCI_REGISTRY="${OCI_REGISTRY%/}"
          OCI_HOST="${OCI_REGISTRY%%/*}"

          {
            echo "registry=oci://${OCI_REGISTRY}"
            echo "host=${OCI_HOST}"
          } >> "${GITHUB_OUTPUT}"

          echo "📦 OCI registry: oci://${OCI_REGISTRY}"

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: 'v3.16.3'

      - name: Update chart version
        run: |
          cd charts/agent-env
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" Chart.yaml
          echo "📝 Updated Chart.yaml:"
          grep -E "^(version|appVersion):" Chart.yaml

      - name: Update Helm dependencies
        run: |
          cd charts/agent-env
          helm dependency update

      - name: Package Helm chart
        run: |
          mkdir -p .deploy
          helm package charts/agent-env -d .deploy
          echo "📦 Packaged chart:"
          ls -la .deploy/

      - name: Log in to OCI chart registry
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          USERNAME="${DOCKERHUB_USERNAME:-${REGISTRY_USERNAME}}"
          PASSWORD="${DOCKERHUB_TOKEN:-${DOCKERHUB_PASSWORD:-${REGISTRY_PASSWORD}}}"

          if [ -z "${USERNAME}" ] || [ -z "${PASSWORD}" ]; then
            echo "DOCKERHUB_USERNAME plus DOCKERHUB_TOKEN, or REGISTRY_USERNAME plus REGISTRY_PASSWORD, are required for ${{ steps.oci.outputs.host }}" >&2
            exit 1
          fi

          printf '%s' "${PASSWORD}" | helm registry login "${{ steps.oci.outputs.host }}" \
            --username "${USERNAME}" \
            --password-stdin

      - name: Publish chart to OCI registry
        run: |
          helm push ".deploy/agent-env-${{ steps.version.outputs.version }}.tgz" "${{ steps.oci.outputs.registry }}"
          {
            echo "### Published OCI chart"
            echo "- ${{ steps.oci.outputs.registry }}/agent-env:${{ steps.version.outputs.version }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Prepare gh-pages content
        run: |
          # If gh-pages exists, copy existing content from charts directory
          if [ -d "gh-pages/charts" ]; then
            cp -r gh-pages/charts/*.tgz .deploy/ 2>/dev/null || true
            cp gh-pages/charts/index.yaml .deploy/ 2>/dev/null || true
          fi

          # Generate/update index
          cd .deploy
          helm repo index . --url https://lincyaw.github.io/agent-env/charts

          echo "📋 Repository index:"
          cat index.yaml

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .deploy
          publish_branch: gh-pages
          destination_dir: charts
          keep_files: true
