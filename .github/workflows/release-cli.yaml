name: Release ARL Artifacts

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          BINARY="arl-${GOOS}-${GOARCH}"
          [ "$GOOS" = "windows" ] && BINARY="${BINARY}.exe"
          go build -ldflags="${LDFLAGS}" -o "dist/${BINARY}" ./cmd/arl/
          cd dist && sha256sum "${BINARY}" > "${BINARY}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: arl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  plugin:
    name: Package Plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Update plugin manifest versions
        run: |
          python3 plugin/scripts/set_plugin_version.py "${{ steps.version.outputs.version }}"
          python3 -m json.tool plugin/.claude-plugin/plugin.json >/dev/null
          python3 -m json.tool plugin/.claude-plugin/marketplace.json >/dev/null
          python3 -m json.tool plugin/.codex-plugin/plugin.json >/dev/null

      - name: Package plugin
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import tarfile
          import zipfile

          version = "${{ steps.version.outputs.version }}"
          source = Path("plugin")
          dist = Path("dist")
          dist.mkdir(exist_ok=True)

          excluded_parts = {
              ".codex-generated-skills",
              "__pycache__",
              ".pytest_cache",
              ".ruff_cache",
          }

          files = [
              path
              for path in source.rglob("*")
              if path.is_file()
              and not any(part in excluded_parts for part in path.relative_to(source).parts)
          ]

          tar_path = dist / f"arl-plugin-{version}.tar.gz"
          with tarfile.open(tar_path, "w:gz") as archive:
              for path in files:
                  archive.add(path, arcname=Path("arl") / path.relative_to(source))

          zip_path = dist / f"arl-plugin-{version}.zip"
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in files:
                  archive.write(path, arcname=Path("arl") / path.relative_to(source))

          print(f"Packaged {tar_path}")
          print(f"Packaged {zip_path}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: arl-plugin
          path: dist/

  release:
    name: Create Release
    needs:
      - build
      - plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Determine tag
        id: tag
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ARL ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
