# agent-env change propagation rules

rules:
  - name: proto-change
    trigger:
      component: agent-proto
      patterns:
        - proto/agent.proto
    impacts:
      - pkg/pb/agent.pb.go
      - pkg/pb/agent_grpc.pb.go
      - pkg/sidecar/
      - pkg/client/
    actions:
      - description: Regenerate Go protobuf code
        command: make proto-go
    validation:
      - go test ./...
      - go build ./cmd/sidecar/
      - go build ./cmd/gateway/

  - name: gateway-change
    trigger:
      patterns:
        - pkg/gateway/*.go
        - cmd/gateway/*.go
    impacts:
      - sdk/python/arl/arl/gateway_client.py
      - sdk/python/arl/arl/session.py
      - charts/agent-env/templates/gateway-*.yaml
    actions:
      - description: Update Python SDK if API shape changed
        manual: true
      - description: Validate gateway image build
        command: docker build -f Dockerfile.gateway -t arl-gateway:dev .
    validation:
      - go test ./...
      - helm lint charts/agent-env

  - name: sidecar-change
    trigger:
      patterns:
        - pkg/sidecar/*.go
        - cmd/sidecar/*.go
    impacts:
      - Dockerfile.sidecar
    actions:
      - description: Rebuild sidecar image
        command: docker build -f Dockerfile.sidecar -t arl-sidecar:dev .
    validation:
      - go test ./...
      - go build ./cmd/sidecar/

  - name: executor-agent-change
    trigger:
      patterns:
        - rust/executor-agent/**
    impacts:
      - Dockerfile.executor-agent-rs
    actions:
      - description: Rebuild executor-agent image
        command: docker build -f Dockerfile.executor-agent-rs -t arl-executor-agent:dev .
    validation:
      - cd executor-agent-rs && cargo test

  - name: sdk-python-change
    trigger:
      patterns:
        - sdk/python/arl/**/*.py
    impacts:
      - examples/python/
    actions:
      - description: Run Python quality checks
        command: uv run ruff check sdk/python/arl/arl examples/python
    validation:
      - uv run ruff check sdk/python/arl/arl examples/python
      - uv run mypy sdk/python/arl/arl

  - name: helm-chart-change
    trigger:
      patterns:
        - charts/agent-env/**
    actions:
      - description: Validate Helm chart
        command: helm lint charts/agent-env
      - description: Render Helm chart
        command: helm template agent-env charts/agent-env
    validation:
      - helm lint charts/agent-env

  - name: go-module-change
    trigger:
      patterns:
        - go.mod
        - go.sum
    actions:
      - description: Tidy dependencies
        command: go mod tidy
    validation:
      - go mod verify
      - go test ./...
