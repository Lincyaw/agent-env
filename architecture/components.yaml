# agent-env component catalog

components:
  - name: gateway
    type: gateway
    paths:
      - cmd/gateway/main.go
      - pkg/gateway/
    responsibilities:
      - Expose session, execute, file, replay, pool, and managed-session REST APIs
      - Create SandboxTemplate, SandboxWarmPool, and SandboxClaim resources
      - Resolve ready SandboxClaims to sidecar endpoints
      - Persist sessions in memory or Redis
      - Write trajectory/audit records to ClickHouse
      - Expose Prometheus metrics on the internal HTTP port
      - Authenticate callers with API keys or trusted forward-auth headers
    interfaces:
      exposes:
        - Public REST API on gateway.port
        - Internal /metrics and debug endpoints on gateway.internalPort
      calls:
        - Kubernetes API for agent-sandbox CRDs
        - Sidecar gRPC AgentService
        - Redis
        - ClickHouse

  - name: agent-sandbox
    type: external-controller
    paths:
      - ../agent-sandbox
    responsibilities:
      - Reconcile SandboxTemplate, SandboxWarmPool, SandboxClaim, and Sandbox resources
      - Maintain warm sandbox pools
      - Adopt ready sandboxes for claims
      - Manage underlying Kubernetes Pod, Service, and PVC resources
    interfaces:
      watches:
        - SandboxTemplate
        - SandboxWarmPool
        - SandboxClaim
        - Sandbox
      manages:
        - Pod
        - Service
        - PVC

  - name: sidecar
    type: sidecar
    paths:
      - cmd/sidecar/main.go
      - pkg/sidecar/
    responsibilities:
      - Run beside the executor container in every sandbox pod
      - Provide gRPC APIs for file operations, process execution, reset, and shell
      - Forward command execution to executor-agent over a Unix socket
      - Snapshot workspace state after steps
    interfaces:
      exposes:
        - AgentService gRPC
      calls:
        - executor-agent Unix socket

  - name: executor-agent
    type: agent
    paths:
      - cmd/executor-agent/main.go
      - pkg/execagent/
    responsibilities:
      - Run inside the executor container
      - Execute commands requested by the sidecar
      - Stream stdout, stderr, and exit status through the Unix socket protocol

  - name: agent-proto
    type: proto
    paths:
      - proto/agent.proto
      - pkg/pb/
    responsibilities:
      - Define the sidecar gRPC AgentService contract
      - Generate Go protobuf and gRPC bindings

  - name: python-sdk
    type: sdk
    paths:
      - sdk/python/arl/
    responsibilities:
      - Provide Python clients for gateway APIs
      - Provide SandboxSession and ManagedSession user workflows
      - Upload/download files, execute commands, restore, replay, and export trajectories

  - name: helm-chart
    type: deployment
    paths:
      - charts/agent-env/
    responsibilities:
      - Deploy gateway
      - Configure Redis, ClickHouse, Prometheus, Grafana, Alertmanager, Tinyauth, and proxy options
      - Grant gateway RBAC for agent-sandbox CRDs

  - name: tinyauth
    type: external-auth
    paths:
      - charts/agent-env/templates/tinyauth.yaml
    responsibilities:
      - Optional edge authentication service for ingress-protected browser access
      - Return Remote-User style headers to trusted ingress auth checks

  - name: observability
    type: support
    paths:
      - pkg/metrics/
      - pkg/audit/
      - charts/agent-env/templates/prometheus.yaml
      - charts/agent-env/templates/grafana.yaml
    responsibilities:
      - Prometheus metrics collection
      - ClickHouse audit and trajectory storage
      - Grafana dashboard provisioning

  - name: redis
    type: support
    paths:
      - pkg/gateway/redis_store.go
      - charts/agent-env/templates/redis.yaml
    responsibilities:
      - Optional gateway session-state persistence

  - name: clickhouse
    type: support
    paths:
      - pkg/audit/
      - charts/agent-env/templates/clickhouse.yaml
    responsibilities:
      - Optional trajectory and audit storage
