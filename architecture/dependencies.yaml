# agent-env dependency graph

dependencies:
  - from: gateway
    to: agent-sandbox
    type: kubernetes-api
    description: Creates and reads SandboxTemplate, SandboxWarmPool, SandboxClaim, and Sandbox resources.

  - from: gateway
    to: sidecar
    type: grpc
    description: Executes commands and file operations through the sidecar AgentService.

  - from: gateway
    to: redis
    type: tcp
    description: Persists session state when Redis is enabled.

  - from: gateway
    to: clickhouse
    type: tcp
    description: Writes trajectory and audit events when ClickHouse is enabled.

  - from: sidecar
    to: executor-agent
    type: unix-socket
    description: Delegates process execution inside the executor container.

  - from: sidecar
    to: agent-proto
    type: implements
    description: Implements AgentService from proto/agent.proto.

  - from: python-sdk
    to: gateway
    type: http
    description: Calls the gateway REST API.

  - from: helm-chart
    to: gateway
    type: deploys
    description: Deploys gateway and grants RBAC for agent-sandbox CRDs.

  - from: helm-chart
    to: observability
    type: deploys
    description: Optionally deploys Redis, ClickHouse, Prometheus, Grafana, Alertmanager, and proxy components.
